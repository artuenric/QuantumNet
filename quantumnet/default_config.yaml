# Default QuatumNet simulation configuration
# Copy this file and change values to create custom scenarios.

decoherence:
  per_timeslot: 0.9       # Decoherence factor applied on each clock tick
  per_measurement: 0.99    # Decoherence factor applied on each fidelity measurement

fidelity:
  epr_threshold: 0.8                # Minimum fidelity to consider an EPR successful (ECHP)
  purification_threshold: 0.8       # Minimum fidelity after purification to accept the EPR
  purification_min_probability: 0.5 # Minimum probability to attempt purification
  initial_epr_fidelity: 1.0         # Default initial fidelity of a created EPR pair

probability:
  epr_create_max: 1.0   # Maximum EPR creation probability on channels
  epr_create_min: 0.2   # Minimum EPR creation probability on channels

protocol:
  link_max_attempts: 2                  # Entanglement attempts before purification
  link_purification_after_failures: 2   # Number of failures to trigger purification
  transport_max_attempts: 2             # Maximum transmission attempts in transport layer

defaults:
  qubits_per_host: 10    # Qubits initialized per host
  eprs_per_channel: 10   # EPR pairs initialized per channel
